name = "layer-intersection"
entrypoint = "main.py"
python = "python3"
capabilities = ["read_layers", "add_layer"]

[[params]]
name = "points_layer"
label = "Point layer"
kind = "layer"
layer_kind = "points"

[[params]]
name = "polygon_layer"
label = "Polygon layer"
kind = "layer"
layer_kind = "vector"

[[params]]
name = "mode"
label = "Mode"
kind = "choice"
options = ["intersection", "difference"]
default = "intersection"
