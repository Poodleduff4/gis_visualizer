[package]
name = "gis_editor"
version = "0.1.0"
edition = "2021"

[dependencies]
eframe = "0.34"
egui = "0.34"
egui-wgpu = "0.34"
wgpu = "29"
bytemuck = { version = "1", features = ["derive"] }
gdal = "0.19"
geo = "0.33"
geo-types = "0.7"
earcutr = "0.5"
anyhow = "1"
rfd = "0.17"
ureq = "2"
image = { version = "0.25", default-features = false, features = ["png"] }
flatgeobuf = "6.0.1"
geozero = { version = "0.14", features = ["with-geo"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "Window",
    "Response",
    "Request",
] }
